{% extends 'loans/base.html' %}
{% block content %}
<style>
/* Body layout for sticky footer */
body {
    background-color: #fff8e1;  /* light cream */
    font-family: 'Georgia', serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Main wrapper to push footer down */
main {
    flex: 1;
}

/* Contact container */
.contact-container {
    max-width: 700px;
    margin: 50px auto;
    padding: 40px;
    background-color: #1a1a1a; /* dark background */
    color: #f5d07a;            /* gold text */
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* Heading */
.contact-container h2 {
    text-align: center;
    font-size: 2.2rem;
    margin-bottom: 30px;
    color: #d4af37;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

/* Paragraph */
.contact-container p {
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 15px;
}

/* Icons in paragraphs */
.contact-container p span.icon {
    margin-right: 8px;
}
.back-home {
    display: inline-block;
    position: absolute;  /* position relative to page */
    top: 150px;          /* below navbar, adjust if needed */
    left: 20px;          /* distance from left edge */
    padding: 12px 28px;
    background-color: #d4af37; /* gold */
    color: black;
    font-weight: bold;
    border-radius: 30px;
    text-decoration: none;
    transition: all 0.3s ease;
    z-index: 1000;       /* make sure it’s above content */
}

.back-home:hover {
    background-color: #b8860b;
    color: white;
    transform: scale(1.05);
}

/* Footer styling */



/* Responsive */
@media (max-width: 768px) {
    .contact-container {
        padding: 25px;
        margin: 30px 15px;
    }

    .contact-container h2 {
        font-size: 1.8rem;
    }

    .contact-container p {
        font-size: 1rem;
    }

    footer .row {
        text-align: center;
    }

    footer .col-md-4 {
        margin-bottom: 20px;
    }
    .back-home {
        position: static;
        margin-bottom: 20px;
        display: inline-block;
    }
}
</style>
<a href="javascript:history.back()" class="back-home">← Go Back</a>
<main>
    <div class="contact-container">
        <h2>Contact Us</h2>
        <p><span class="icon">📧</span>Email: mariogold@jewellery.com</p>
        <p><span class="icon">📞</span>Phone: +91 93441 80221</p>
        <p><span class="icon">📍</span>Address: Rajajinagar, Bangalore, India</p>
    </div>
</main>


{% endblock %}
