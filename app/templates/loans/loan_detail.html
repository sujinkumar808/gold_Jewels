{% extends 'loans/base.html' %}
{% load static %}

{% block content %}
<style>
/* ===============================
   LUXURY PRODUCT PAGE DESIGN
================================ */

body {
    background: linear-gradient(to right, #fff8e1, #fffdf5);
    font-family: 'Georgia', serif;
}

/* Main Container */
.product-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 80px;
    max-width: 1200px;
    margin: 80px auto;
    padding: 40px;
}

/* ================= IMAGE SECTION ================= */

.product-image {
    flex: 0 0 480px;
    text-align: center;
    position: relative;
}

/* Gold Glow Background Effect */
.product-image::before {
    content: "";
    position: absolute;
    width: 380px;
    height: 380px;
    background: radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    border-radius: 50%;
}

.product-image img {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 480px;
    object-fit: contain;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    transition: all 0.4s ease;
}

.product-image img:hover {
    transform: scale(1.06);
    box-shadow: 0 20px 50px rgba(212,175,55,0.4);
}

/* ================= CONTENT SECTION ================= */

.product-details {
    flex: 1;
}

/* Title with gold underline */
.product-title {
    font-size: 2.8rem;
    font-weight: bold;
    color: #b8860b;
    margin-bottom: 10px;
    position: relative;
}

.product-title::after {
    content: "";
    width: 60px;
    height: 3px;
    background: #d4af37;
    display: block;
    margin-top: 10px;
}

/* Price */
.product-price {
    font-size: 2rem;
    color: #d4af37;
    margin: 20px 0;
}

/* Description */
.product-description {
    line-height: 1.8;
    margin-bottom: 25px;
    color: #444;
}

/* Features */
.product-features {
    margin-bottom: 30px;
    padding-left: 0;
    list-style: none;
}

.product-features li {
    margin-bottom: 12px;
    padding-left: 28px;
    position: relative;
    font-size: 16px;
}

.product-features li::before {
    content: "✦";
    position: absolute;
    left: 0;
    color: #d4af37;
    font-size: 18px;
}

/* ================= BUTTONS ================= */

.product-buttons {
    display: flex;
    gap: 25px;
}

/* Add to Cart */
.product-buttons button:first-child {
    background: linear-gradient(45deg, #d4af37, #f5d07a);
    color: black;
    padding: 14px 35px;
    border-radius: 50px;
    border: none;
    font-weight: bold;
    letter-spacing: 1px;
    transition: 0.4s ease;
}

.product-buttons button:first-child:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(212,175,55,0.4);
}

/* Buy Now */
.product-buttons button:last-child {
    background: black;
    color: white;
    padding: 14px 35px;
    border-radius: 50px;
    border: 2px solid #d4af37;
    font-weight: bold;
    letter-spacing: 1px;
    transition: 0.4s ease;
}

.product-buttons button:last-child:hover {
    background: #d4af37;
    color: black;
    transform: translateY(-3px);
}

/* ================= BACK BUTTON ================= */

.back-home {
    display: inline-block;
    position: absolute;  /* position relative to page */
    top: 150px;          /* below navbar, adjust if needed */
    left: 20px;          /* distance from left edge */
    padding: 12px 28px;
    background-color: #d4af37; /* gold */
    color: black;
    font-weight: bold;
    border-radius: 30px;
    text-decoration: none;
    transition: all 0.3s ease;
    z-index: 1000;       /* make sure it’s above content */
}

.back-home:hover {
    background-color: #b8860b;
    color: white;
    transform: scale(1.05);
}



/* ================= RESPONSIVE ================= */

@media (max-width: 992px) {
    .product-container {
        flex-direction: column;
        text-align: center;
        gap: 40px;
    }

    .product-image {
        flex: none;
        width: 100%;
    }

    .product-details {
        width: 100%;
    }

    .product-buttons {
        justify-content: center;
        flex-wrap: wrap;
    }

    .back-home {
        position: static;
        margin: 20px auto;
        display: inline-block;
    }
}
</style>
<!-- Back to Home button -->

<a href="{% url 'app:home' %}" class="back-home">← Back to Home</a>



<div class="page-wrapper">



  <div class="page-content">



    <div class="product-container">

        <div class="product-image">

            <img src="{% static product.image %}" alt="{{ product.name }}">

        </div>



        <div class="product-details">

            <h2 class="product-title">{{ product.name }}</h2>

            <h3 class="product-price">₹{{ product.price }}</h3>

            <p class="product-description">{{ product.description }}</p>



            <ul class="product-features">

              <li>High purity gold</li>

              <li>Instant processing</li>

              <li>Flexible repayment options</li>

            </ul>

            <div class="product-buttons">

                <a href="{% url 'app:add_to_cart' product.id%}">

                    <button type="button">Add to Cart</button>

                </a>

                <!-- Buy Now goes to checkout page -->

                <a href="{% url 'app:buy_now' product.id %}">

                    <button type="button">Buy Now</button>

                </a>

            </div>

           

            <script>

            function addToCart(productId) {

                fetch(`/add-to-cart/${productId}/`, {

                    method: 'GET',

                    credentials: 'same-origin'

                })

                .then(res => {

                    if (res.ok) {

                        // You can replace alert with a nicer UI message later

                        alert('Product added to cart!');

                    } else {

                        alert('Failed to add product to cart.');

                    }

                })

                .catch(err => {

                    console.error(err);

                    alert('Error adding product to cart.');

                });

            }

            </script>

         



            <p class="product-note">Secure payment | 100% Authentic | Fast Delivery</p>

        </div>



    </div>



  </div>






</div>

{% endblock %}
