{% extends 'loans/base.html' %}
{% block content %}
<style>
/* Body layout for sticky footer */
body {
    background-color: #fff8e1;
    font-family: 'Georgia', serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Main wrapper to push footer down */
main {
    flex: 1;
}

/* Gold heading */
.gold-heading {
    text-align: center;
    color: #d4af37;
    font-size: 2.5rem;
    font-weight: bold;
    margin-bottom: 40px;
}

/* Cards */
.card {
    border-radius: 15px;
    border: none;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background: #fff7e6;
}

.card:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.card-title {
    color: #b8860b;
    font-weight: bold;
    font-size: 1.2rem;
    margin-bottom: 10px;
}

.card-text {
    color: #ff0000;
    font-weight: bold;
    font-size: 1.1rem;
}
.back-home {
    display: inline-block;
    position: absolute;  /* position relative to page */
    top: 150px;          /* below navbar, adjust if needed */
    left: 20px;          /* distance from left edge */
    padding: 12px 28px;
    background-color: #d4af37; /* gold */
    color: black;
    font-weight: bold;
    border-radius: 30px;
    text-decoration: none;
    transition: all 0.3s ease;
    z-index: 1000;       /* make sure it’s above content */
}

.back-home:hover {
    background-color: #b8860b;
    color: white;
    transform: scale(1.05);
}
/* Footer */


/* Responsive */
@media (max-width: 768px) {
    .gold-heading {
        font-size: 2rem;
    }
    .card-title {
        font-size: 1rem;
    }
    .card-text {
        font-size: 1rem;
    }
    footer .row {
        text-align: center !important;
    }
    footer .col-md-4 {
        margin-bottom: 20px;
    }
    .back-home {
        position: static;
        margin-bottom: 20px;
        display: inline-block;
    }
}
</style>
<a href="javascript:history.back()" class="back-home">← Go Back</a>
<main>
    <div class="container mt-5">
        <h2 class="gold-heading">Current Gold Rates</h2>

        <div class="row justify-content-center">
            {% for rate in rates %}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
                <div class="card shadow text-center p-4">
                    <h5 class="card-title">{{ rate.weight }}</h5>
                    <p class="card-text">₹{{ rate.price }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</main>


{% endblock %}
